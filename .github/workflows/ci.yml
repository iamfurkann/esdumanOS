name: esdumanOS CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v3

      - name: Bagimliliklari Kur (GCC, Clang, QEMU, Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib clang qemu-system-x86 python3 nasm mtools xorriso

      - name: 1. Host Araclarini Test Et
        run: make test

      - name: 2. Fuzzing & Guvenlik Testleri
        run: make fuzz

      - name: 3. Isletim Sistemini Derle
        run: make

      - name: 4. Kernel QEMU Entegrasyon ve Regresyon Testleri
        run: make test_kernel
