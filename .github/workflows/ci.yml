name: esdumanOS CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v3

      - name: Bagimliliklari Kur (GCC, QEMU, Python)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib qemu-system-x86 python3 nasm mtools xorriso

      - name: 1. Host Araclarini Test Et (Python & C)
        run: make test

      - name: 2. Isletim Sistemini Derle (Build)
        run: make

      - name: 3. Kernel QEMU Self-Test
        run: |
          make test_kernel
